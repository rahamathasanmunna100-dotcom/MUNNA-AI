<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MUNNA AI</title>

    <link rel="stylesheet" href="style.css">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

    <!-- Header -->
    <header>

        <div class="left">

            <img src="profile.jpg" class="profile" alt="Profile">

            <div>
                <h2>MUNNA AI</h2>
                <p>Created by Munna</p>
            </div>

        </div>

        <button id="themeBtn">🌙</button>

    </header>

    <!-- Chat -->
    <main id="chat"></main>

    <!-- Footer -->
    <footer>

        <button id="micBtn" onclick="startVoice()">🎤</button>

        <label for="imageFile" class="upload-btn">🖼️</label>
        <input type="file" id="imageFile" accept="image/*" hidden>

        <label for="pdfFile" class="upload-btn">📄</label>
        <input type="file" id="pdfFile" accept=".pdf" hidden>

        <input
            id="message"
            type="text"
            placeholder="Ask anything..."
            autocomplete="off"
        >

        <button onclick="sendMessage()">Send</button>

    </footer>

</div>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js");
}
</script>

</body>
</html>
