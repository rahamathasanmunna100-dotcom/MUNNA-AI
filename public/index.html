<footer>

    <!-- Voice -->
    <button id="micBtn" onclick="startVoice()">
        🎤
    </button>

    <!-- Image Upload -->
    <label for="imageFile" class="upload-btn">
        🖼️
    </label>

    <input
        type="file"
        id="imageFile"
        accept="image/*"
        hidden
    >

    <!-- PDF Upload -->
    <label for="pdfFile" class="upload-btn">
        📄
    </label>

    <input
        type="file"
        id="pdfFile"
        accept=".pdf"
        hidden
    >

    <!-- Message -->
    <input
        id="message"
        type="text"
        placeholder="Ask anything..."
        autocomplete="off"
    >

    <!-- Send -->
    <button onclick="sendMessage()">
        Send
    </button>

</footer>
